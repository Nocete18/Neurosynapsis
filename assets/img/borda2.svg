<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1296 1080" width="1296" height="1080" role="img" aria-label="Moldura 20% mais larga com borda limpa em gradiente">
  <title>Moldura 20% mais larga com borda limpa</title>
  <desc>Overlay transparente 20% mais largo horizontalmente. Usa o mesmo canvas, centro e contorno da máscara.</desc>
  <defs>
    <linearGradient id="borderGradient" x1="144" y1="120" x2="1152" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8CDF8"/>
      <stop offset="0.22" stop-color="#9FEAD9"/>
      <stop offset="0.45" stop-color="#B8DBFF"/>
      <stop offset="0.70" stop-color="#C7F1E3"/>
