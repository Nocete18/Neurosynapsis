    <linearGradient id="accentGradient" x1="180" y1="180" x2="1116" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7A7D7"/>
      <stop offset="0.50" stop-color="#FFD35B"/>
      <stop offset="1" stop-color="#9FEAD9"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#8B5CF6" flood-opacity="0.08"/>
    </filter>
    <style>
      .main-border { fill:none; stroke:url(#borderGradient); stroke-width:38; stroke-linecap:round; stroke-linejoin:round; opacity:.96; filter:url(#softShadow); }
      .inner-light { fill:none; stroke:#fff; stroke-width:8; stroke-linecap:round; stroke-linejoin:round; opacity:.42; stroke-dasharray:245 150 82 175; }
      .accent-line { fill:none; stroke:url(#accentGradient); stroke-width:9; stroke-linecap:round; stroke-linejoin:round; opacity:.82; }
      .soft-ring { fill:none; stroke-linecap:round; stroke-linejoin:round; opacity:.44; }
    </style>
  </defs>

